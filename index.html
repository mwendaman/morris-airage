<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✈️ The Morris AirSage App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Morris AirSage"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f2efe8"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238a6520'/><text y='.9em' font-size='70' x='15'>✈️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f2efe8;--surface:#fff;--surface2:#f8f6f1;--surface3:#ece9e1;--border:#ddd8ce;--border2:#c4bdb0;--gold:#8a6520;--gold-accent:#b8882c;--gold-dim:rgba(138,101,32,0.10);--text:#1e1b16;--text2:#3d3830;--muted:#7a7468;--muted2:#5e5850;--teal:#0a6b5e;--green:#1a6b2e;--amber:#8a5200;--rose:#a02020;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 110% 55% at 50% -5%,rgba(138,101,32,0.07) 0%,transparent 55%),radial-gradient(ellipse 55% 55% at 92% 92%,rgba(10,107,94,0.04) 0%,transparent 50%);}
header{position:relative;z-index:10;padding:1.4rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.8rem;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:0.85rem;}
.brand-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:0 2px 10px rgba(138,101,32,0.22);}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--text);letter-spacing:0.02em;line-height:1;}
.brand-tag{font-size:0.57rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted2);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.okc-badge{display:flex;align-items:center;gap:5px;background:var(--gold-dim);border:1px solid rgba(138,101,32,0.25);border-radius:7px;padding:4px 10px;font-size:0.7rem;font-weight:500;color:var(--gold);}
.src-pill{font-size:0.57rem;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid;}
.src-pill.g{border-color:#2a6dd9;color:#2a6dd9;background:rgba(42,109,217,0.07);}
.src-pill.h{border-color:#7c22d4;color:#7c22d4;background:rgba(124,34,212,0.07);}
.src-pill.k{border-color:#c44a00;color:#c44a00;background:rgba(196,74,0,0.07);}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:9;}
.tab-btn{flex:0 0 auto;padding:0.8rem 1.1rem;font-family:'Outfit',sans-serif;font-size:0.78rem;font-weight:500;color:var(--muted2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold-accent);font-weight:600;}
main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.page-title{margin-bottom:1.6rem;text-align:center;}
.page-title h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:0.4rem;}
.page-title h2 em{color:var(--gold);font-style:italic;}
.page-title p{font-size:0.85rem;color:var(--muted2);line-height:1.65;max-width:560px;margin:0 auto;}
.rules-bar{display:flex;align-items:center;justify-content:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:1.6rem;padding:0.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.rule-item{display:flex;align-items:center;gap:5px;font-size:0.7rem;color:var(--muted2);}
.rule-item .dot{width:5px;height:5px;border-radius:50%;background:var(--gold-accent);flex-shrink:0;}
.rule-sep{color:var(--border2);}
.section-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:0.85rem;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.form-row{display:grid;gap:1rem;margin-bottom:1.3rem;}
.cols-2{grid-template-columns:1fr 1fr;}.cols-3{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted2);font-weight:500;}
.field input,.field select{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:0.6rem 0.85rem;font-family:'Outfit',sans-serif;font-size:0.86rem;color:var(--text);outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color 0.2s,box-shadow 0.2s;}
.field input:focus,.field select:focus{border-color:var(--gold-accent);box-shadow:0 0 0 3px rgba(138,101,32,0.10);}
.field input::placeholder{color:var(--muted);}
.field input[readonly]{color:var(--muted2);background:var(--surface3);cursor:default;}
.pax-display{display:flex;align-items:center;gap:8px;background:var(--surface3);border:1.5px solid var(--border);border-radius:8px;padding:0.6rem 0.85rem;font-size:0.86rem;color:var(--text2);}
.cabin-selector{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:1.3rem;}
.cabin-option{position:relative;}
.cabin-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.cabin-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:1rem;text-align:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all 0.2s;}
.cabin-label:hover{border-color:var(--border2);}
.cabin-option input:checked+.cabin-label{border-color:var(--gold-accent);background:var(--gold-dim);box-shadow:0 0 0 3px rgba(138,101,32,0.08);}
.cabin-icon{font-size:1.4rem;}.cabin-name{font-size:0.78rem;font-weight:500;color:var(--text);}.cabin-desc{font-size:0.62rem;color:var(--muted2);line-height:1.4;}
.predict-btn{width:100%;padding:0.9rem;background:var(--text);color:#f5eedc;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s,transform 0.1s,box-shadow 0.2s;box-shadow:0 3px 12px rgba(30,27,22,0.18);}
.predict-btn:hover:not(:disabled){background:#3a3328;transform:translateY(-1px);}
.predict-btn:disabled{opacity:.38;cursor:not-allowed;transform:none;}
.error-msg{display:none;padding:0.8rem 1.1rem;margin-bottom:1rem;background:rgba(160,32,32,0.06);border:1px solid rgba(160,32,32,0.22);border-radius:8px;color:var(--rose);font-size:0.83rem;text-align:center;}
.error-msg.active{display:block;}
.loading-state{display:none;text-align:center;padding:2.5rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:1.2rem;}
.loading-state.active{display:block;}
.loading-plane{font-size:2.2rem;display:block;margin-bottom:0.8rem;animation:fly 2s ease-in-out infinite;}
@keyframes fly{0%,100%{transform:translateX(-8px) rotate(-5deg);}50%{transform:translateX(8px) rotate(5deg);}}
.loading-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--text);margin-bottom:0.3rem;}
.loading-sub{font-size:0.76rem;color:var(--muted2);}
.loading-sources{display:flex;align-items:center;justify-content:center;gap:1.2rem;margin-top:1.2rem;flex-wrap:wrap;}
.loading-src{font-size:0.66rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.pulse-dot{width:6px;height:6px;border-radius:50%;animation:pdot 1.5s ease-in-out infinite;}
.pulse-dot.g{background:#2a6dd9;animation-delay:0s;}.pulse-dot.h{background:#7c22d4;animation-delay:0.4s;}.pulse-dot.k{background:#c44a00;animation-delay:0.8s;}.pulse-dot.a{background:#003366;animation-delay:1s;}
@keyframes pdot{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
#results{display:none;}#results.active{display:block;}
.results-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.4rem;}
.results-header h3{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--text);}
.results-header .meta{font-size:0.7rem;color:var(--muted2);}
.verdict-banner{border-radius:13px;padding:1.1rem 1.4rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.9rem;border:1.5px solid;}
.verdict-banner.buy{background:rgba(26,107,46,0.07);border-color:rgba(26,107,46,0.30);}
.verdict-banner.wait{background:rgba(138,82,0,0.07);border-color:rgba(138,82,0,0.30);}
.verdict-banner.watch{background:rgba(10,107,94,0.07);border-color:rgba(10,107,94,0.30);}
.verdict-icon{font-size:1.9rem;flex-shrink:0;}
.verdict-action{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;margin-bottom:3px;}
.verdict-banner.buy .verdict-action{color:var(--green);}.verdict-banner.wait .verdict-action{color:var(--amber);}.verdict-banner.watch .verdict-action{color:var(--teal);}
.verdict-summary{font-size:0.86rem;color:var(--text2);line-height:1.55;}
.source-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:0.85rem;margin-bottom:1.2rem;}
.source-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.05rem;}
.source-card-header{display:flex;align-items:center;gap:6px;margin-bottom:0.7rem;}
.source-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.source-dot.g{background:#2a6dd9;}.source-dot.h{background:#7c22d4;}.source-dot.k{background:#c44a00;}
.source-card-name{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
.source-card.g .source-card-name{color:#2a6dd9;}.source-card.h .source-card-name{color:#7c22d4;}.source-card.k .source-card-name{color:#c44a00;}
.source-signal{font-size:0.72rem;font-weight:600;margin-bottom:4px;}
.signal-buy{color:var(--green);}.signal-wait{color:var(--amber);}.signal-watch{color:var(--teal);}
.source-card-text{font-size:0.75rem;color:var(--muted2);line-height:1.55;}
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.4rem;margin-bottom:1.2rem;}
.price-header{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:0.9rem;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;}
.price-item-label{font-size:0.66rem;color:var(--muted2);margin-bottom:3px;}
.price-item-value{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--text);line-height:1;}
.price-item-value span{font-size:0.8rem;font-weight:400;color:var(--muted);margin-left:3px;}
.price-item-sub{font-size:0.66rem;color:var(--muted);margin-top:3px;}
.price-range{margin-top:0.9rem;padding-top:0.9rem;border-top:1px solid var(--border);}
.range-label{font-size:0.68rem;color:var(--muted2);margin-bottom:7px;}
.range-bar{height:5px;background:var(--surface3);border-radius:999px;position:relative;margin-bottom:5px;}
.range-fill{position:absolute;top:0;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold-accent));border-radius:999px;}
.range-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:var(--gold-accent);border:2px solid #fff;border-radius:50%;}
.range-labels{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);}
.range-labels .cur{color:var(--gold);font-weight:500;}
.insight-cards{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:1.2rem;}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.1rem;}
.insight-title{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.6rem;font-weight:500;}
.insight-val{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.insight-sub{font-size:0.72rem;color:var(--muted2);line-height:1.55;}
.route-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.4rem;margin-bottom:1.2rem;}
.route-title{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:0.8rem;}
.route-text{font-size:0.82rem;color:var(--muted2);line-height:1.72;}
.route-text strong{color:var(--text);font-weight:500;}
.tips-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.4rem;margin-bottom:1.2rem;}
.tips-title{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:0.8rem;}
.tip-item{display:flex;gap:9px;align-items:flex-start;padding:0.55rem 0;border-bottom:1px solid var(--border);}
.tip-item:last-child{border-bottom:none;padding-bottom:0;}
.tip-num{width:20px;height:20px;flex-shrink:0;margin-top:1px;background:var(--gold-dim);border:1px solid rgba(138,101,32,0.28);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:600;color:var(--gold);}
.tip-text{font-size:0.8rem;color:var(--muted2);line-height:1.55;}
.tip-text strong{color:var(--text);font-weight:500;}
.airline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:0.6rem;margin-bottom:1rem;}
.airline-btn{display:flex;align-items:center;gap:8px;padding:0.6rem 0.85rem;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;text-decoration:none;font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:500;color:var(--text2);transition:all 0.18s;}
.airline-btn:hover{border-color:var(--gold-accent);color:var(--gold);background:var(--gold-dim);transform:translateY(-1px);}
.airline-emoji{font-size:0.85rem;font-weight:700;flex-shrink:0;font-family:monospace;background:var(--surface3);padding:2px 5px;border-radius:4px;}
.airline-info{display:flex;flex-direction:column;gap:1px;}
.airline-name{font-weight:500;font-size:0.75rem;line-height:1;}
.airline-cabin{font-size:0.6rem;color:var(--muted);}
.aggregator-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;}
.agg-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:0.65rem 0.7rem;border-radius:8px;border:1.5px solid;background:transparent;font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;text-decoration:none;transition:background 0.18s;}
.agg-btn.g{border-color:#2a6dd9;color:#2a6dd9;}.agg-btn.g:hover{background:rgba(42,109,217,0.08);}
.agg-btn.h{border-color:#7c22d4;color:#7c22d4;}.agg-btn.h:hover{background:rgba(124,34,212,0.08);}
.agg-btn.k{border-color:#c44a00;color:#c44a00;}.agg-btn.k:hover{background:rgba(196,74,0,0.08);}
.dest-hero{display:flex;align-items:center;gap:1.2rem;padding:1.4rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:1.2rem;}
.dest-flag{font-size:3rem;flex-shrink:0;}
.dest-hero-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--text);line-height:1.1;}
.dest-hero-sub{font-size:0.78rem;color:var(--muted2);margin-top:3px;}
.dest-hero-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.dest-badge{font-size:0.6rem;font-weight:500;letter-spacing:0.08em;padding:2px 8px;border-radius:999px;border:1px solid;}
.dest-badge.hub{border-color:var(--gold-accent);color:var(--gold);background:var(--gold-dim);}
.dest-badge.airline{border-color:var(--border2);color:var(--muted2);background:var(--surface2);}
.price-intel-section{margin-bottom:1.4rem;}
.price-intel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-wrap:wrap;gap:0.5rem;}
.price-intel-title{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:8px;flex:1;}
.price-intel-title::after{content:'';height:1px;background:var(--border);flex:1;min-width:20px;}
.check-prices-btn{display:flex;align-items:center;gap:6px;padding:0.5rem 1.1rem;background:var(--text);color:#f5eedc;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:background 0.18s,transform 0.1s;white-space:nowrap;}
.check-prices-btn:hover:not(:disabled){background:#3a3328;transform:translateY(-1px);}
.check-prices-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.airline-price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:0.85rem;}
.airline-price-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.1rem;transition:box-shadow 0.2s;}
.airline-price-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.apc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.55rem;}
.apc-name-row{display:flex;align-items:center;gap:7px;}
.apc-code{font-size:0.7rem;font-weight:700;background:var(--surface3);padding:2px 6px;border-radius:4px;color:var(--text2);font-family:monospace;}
.apc-name{font-size:0.82rem;font-weight:600;color:var(--text);}
.apc-verdict{font-size:0.57rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:999px;}
.apc-verdict.buy{background:rgba(26,107,46,0.10);color:var(--green);border:1px solid rgba(26,107,46,0.25);}
.apc-verdict.wait{background:rgba(138,82,0,0.10);color:var(--amber);border:1px solid rgba(138,82,0,0.25);}
.apc-verdict.watch{background:rgba(10,107,94,0.10);color:var(--teal);border:1px solid rgba(10,107,94,0.25);}
.apc-cabin{font-size:0.61rem;color:var(--muted2);margin-bottom:0.6rem;}
.apc-prices{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.6rem;padding:0.6rem;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.apc-price-label{font-size:0.57rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.apc-price-val{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:700;color:var(--text);line-height:1;}
.apc-price-val span{font-size:0.63rem;color:var(--muted);font-weight:400;margin-left:2px;}
.apc-price-sub{font-size:0.59rem;color:var(--muted);margin-top:1px;}
.apc-mini-bar{margin-bottom:0.6rem;}
.apc-mini-bar-track{height:4px;background:var(--surface3);border-radius:999px;position:relative;margin-bottom:4px;}
.apc-mini-fill{position:absolute;top:0;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold-accent));border-radius:999px;}
.apc-mini-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--gold-accent);border:2px solid #fff;border-radius:50%;}
